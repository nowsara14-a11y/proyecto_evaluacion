<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEA - Registro</title>
    <style>
        body { background-color: #004a99; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 420px; height: 520px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .header-sea { display: flex; align-items: center; justify-content: center; margin-bottom: 25px; gap: 15px; }
        .logo { width: 90px; height: auto; }
        .title-text { text-align: left; color: #004a99; line-height: 1; }
        .title-text h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; font-size: 1.1rem; border: 3px solid #004a99; border-radius: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #ffcc00; color: #004a99; font-weight: bold; font-size: 1.4rem; border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .footer { margin-top: 25px; font-size: 1rem; color: #004a99; font-weight: bold; }
        .footer a { color: #004a99; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header-sea">
            <img src="/static/css/logo.jpg" class="logo">
            <div class="title-text">
                <h1>SISTEMA</h1>
                <h1>EVALUATIVO</h1>
                <h1>ACADÉMICO</h1>
            </div>
        </div>
        <form action="/registro" method="POST">
            <input type="text" name="username" placeholder="Nuevo Usuario" required>
            <input type="password" name="password" placeholder="Nueva Contraseña" required>
            <button type="submit">REGISTRARSE</button>
        </form>
        <div class="footer">¿Ya tienes cuenta? <a href="/login">Inicia Sesión</a></div>
    </div>
</body>
</html>
