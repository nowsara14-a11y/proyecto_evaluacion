<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SEA - Acceso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background: linear-gradient(135deg, #e3f2fd 0%, #f5f5f5 100%); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="card" style="width: 400px; padding: 40px; border-top: 5px solid #3498db; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color: #2c3e50; margin-bottom: 10px; text-align: center; font-size: 1.8em;">Sistema SEA</h2>
        <p style="color: #546e7a; margin-bottom: 30px; text-align: center; font-weight: 500;">Panel de Acceso para Jurados</p>
        
        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: #2c3e50; margin-bottom: 8px; font-size: 0.9em; font-weight: bold;">Usuario:</label>
                <input type="text" name="usuario" placeholder="Ej: jurado_central" required 
                       style="width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 1em; background: white; color: #2c3e50;">
            </div>
            
            <div style="margin-bottom: 30px;">
                <label style="display: block; color: #2c3e50; margin-bottom: 8px; font-size: 0.9em; font-weight: bold;">Contraseña:</label>
                <input type="password" name="password" placeholder="••••••••" required 
                       style="width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 1em; background: white; color: #2c3e50;">
            </div>
            
            <button type="submit" class="btn-submit" style="width: 100%; padding: 14px; font-size: 1.1em; font-weight: bold; cursor: pointer;">
                Ingresar al Sistema
            </button>
        </form>
        
        <div style="margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            <p style="font-size: 0.9em; color: #7f8c8d;">
                ¿Nuevo jurado? <a href="/registro" style="color: #3498db; text-decoration: none; font-weight: bold;">Crea tu cuenta aquí</a>
            </p>
        </div>
    </div>
</body>
</html>
